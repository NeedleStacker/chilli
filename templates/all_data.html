<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <title>Chilli - Svi podaci</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { padding:20px; }
    canvas { max-height:300px; margin-bottom:30px; }
    table { font-size:0.85rem; }
  </style>
</head>
<body>
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">📊 Svi podaci iz baze</h2>
        <a href="/" class="btn btn-secondary">Povratak na Glavnu Stranicu</a>
    </div>

  <div class="mb-4">
    <label for="whereInput" class="form-label">Filter podataka (SQL WHERE uvjet, npr. <code>soil_percent &gt; 40</code>):</label>
    <div class="input-group">
      <input type="text" id="whereInput" class="form-control" value="" placeholder="npr. dht22_air_temp > 25 AND lux < 1000">
      <button class="btn btn-primary" id="applyFilterBtn">Primijeni filter</button>
    </div>
	<small class="form-text text-muted mb-1">Primjeri WHERE uvjeta:</small>
	<div class="d-flex flex-wrap gap-2 mb-3">
	  <button type="button" class="btn btn-sm btn-outline-secondary example-btn">id &gt; 1000</button>
	  <button type="button" class="btn btn-sm btn-outline-secondary example-btn">dht22_air_temp &gt; 25</button>
	  <button type="button" class="btn btn-sm btn-outline-secondary example-btn">soil_percent &lt; 30</button>
	  <button type="button" class="btn btn-sm btn-outline-secondary example-btn">lux &lt; 500</button>
	  <button type="button" class="btn btn-sm btn-outline-secondary example-btn">stable = 0</button>
	  <button type="button" class="btn btn-sm btn-outline-secondary example-btn" id="timestamp-btn">timestamp (zadnjih 30 dana)</button>
	</div>
  </div>

  <canvas id="airTempChart"></canvas>
  <canvas id="airHumidityChart"></canvas>
  <canvas id="soilTempChart"></canvas>
  <canvas id="soilMoistureChart"></canvas>
  <canvas id="luxChart"></canvas>

  <div class="card mb-4">
    <div class="card-body">
      <h5>📈 Statistika</h5>
      <pre id="stats"></pre>
    </div>
  </div>

  <h5 class="mt-3">Brisanje podataka</h5>
  <div class="input-group mb-2">
    <input id="deleteIdsInput" type="text" class="form-control" placeholder="ID-evi npr: 1,2,3 ili 'all'">
    <button class="btn btn-danger" id="btnDeleteRows">Obriši</button>
  </div>
  <div id="deleteStatus" class="text-muted small"></div>

  <h4 class="mt-4">Tablica svih podataka</h4>
  <div style="max-height:400px; overflow:auto;">
    <table class="table table-striped table-sm">
      <thead class="table-light" style="position: sticky; top: 0;">
        <tr>
          <th>ID</th><th>Vrijeme</th><th>Air T</th><th>Air H</th>
          <th>Soil T</th><th>Soil %</th><th>Lux</th><th>Stable</th>
        </tr>
      </thead>
      <tbody id="logsBody"></tbody>
    </table>
  </div>
</div>

<script>
let charts = [];

async function fetchData() {
  const where = document.getElementById('whereInput').value.trim();
  const url = where ? `/api/logs/all?where=${encodeURIComponent(where)}` : '/api/logs/all';
  try {
    const r = await fetch(url);
    if (!r.ok) {
        alert(`Greška pri dohvaćanju podataka: ${r.statusText}`);
        return [];
    }
    return await r.json();
  } catch (e) {
    alert(`Mrežna greška: ${e.message}`);
    return [];
  }
}

function clearCharts() {
  charts.forEach(chart => chart.destroy());
  charts = [];
}

function calcStats(data) {
  const avg = arr => arr.length > 0 ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
  const validData = key => data.map(r => r[key]).filter(v => v!==null);
  return {
    count: data.length,
    air_temp_avg: avg(validData('dht22_air_temp')).toFixed(2),
    air_humidity_avg: avg(validData('dht22_humidity')).toFixed(2),
    soil_temp_avg: avg(validData('ds18b20_soil_temp')).toFixed(2),
    soil_percent_avg: avg(validData('soil_percent')).toFixed(2),
    lux_avg: avg(validData('lux')).toFixed(2)
  };
}

function formatTime(ts) {
  if (!ts) return "";
  return ts.replace('_', ' ').replace(/-/g,'.');
}

function makeChart(id, label, labels, data, color) {
  const ctx = document.getElementById(id).getContext('2d');
  const chart = new Chart(ctx, {
    type:'line',
    data:{
      labels:labels,
      datasets:[{label:label, data:data, borderColor:color, tension:0.2, fill:false}]
    },
    options:{ responsive:true, maintainAspectRatio:false }
  });
  charts.push(chart);
}

async function loadData() {
  const data = await fetchData();
  clearCharts();

  const labels = data.map(r => formatTime(r.timestamp));

  makeChart('airTempChart', 'Air Temperature (°C)', labels, data.map(r => r.dht22_air_temp), 'blue');
  makeChart('airHumidityChart', 'Air Humidity (%)', labels, data.map(r => r.dht22_humidity), 'skyblue');
  makeChart('soilTempChart', 'Soil Temperature (°C)', labels, data.map(r => r.ds18b20_soil_temp), 'orange');
  makeChart('soilMoistureChart', 'Soil Moisture (%)', labels, data.map(r => r.soil_percent), 'green');
  makeChart('luxChart', 'Lux', labels, data.map(r => r.lux), 'purple');

  // Tablica
  const tbody = document.getElementById('logsBody');
  tbody.innerHTML = "";
  data.slice().reverse().forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r.id}</td>
      <td>${formatTime(r.timestamp)}</td>
      <td>${r.dht22_air_temp ?? ''}</td>
      <td>${r.dht22_humidity ?? ''}</td>
      <td>${r.ds18b20_soil_temp ?? ''}</td>
      <td>${r.soil_percent ?? ''}</td>
      <td>${r.lux ?? ''}</td>
      <td>${r.stable ? 'DA' : 'NE'}</td>`;
    tbody.appendChild(tr);
  });

  // Statistika
  const stats = calcStats(data);
  document.getElementById('stats').innerText = JSON.stringify(stats, null, 2);
}

document.getElementById('btnDeleteRows').addEventListener('click', async () => {
  const input = document.getElementById('deleteIdsInput').value.trim();
  const statusEl = document.getElementById('deleteStatus');

  if (!input) {
    statusEl.innerText = "Unesite ID-eve za brisanje ili 'all'.";
    return;
  }

  const payload = input.toLowerCase() === "all" ? { ids: "all" } : { ids: input };
  const confirmDelete = confirm(`Jeste li sigurni da želite obrisati ${input === "all" ? "SVE redove" : "ove redove: " + input}?`);
  if (!confirmDelete) return;

  try {
    const res = await fetch('/api/logs/delete', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (data.ok) {
      statusEl.innerText = `Obrisano: ${data.deleted === "all" ? "svi redovi" : data.deleted + " redova."}`;
      await loadData(); // Osvježi
    } else {
      statusEl.innerText = `Greška: ${data.msg || data.error}`;
    }
  } catch (e) {
    statusEl.innerText = "Greška pri brisanju: " + e.message;
  }
});

document.querySelectorAll('.example-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const whereInput = document.getElementById('whereInput');
    if (btn.id === 'timestamp-btn') {
      const today = new Date();
      const priorDate = new Date(new Date().setDate(today.getDate() - 30));
      const formatDate = (d) => d.toISOString().split('T')[0].replace(/-/g, '-');
      // Format za bazu je YYYY-MM-DD_HH-MM-SS
      whereInput.value = `timestamp BETWEEN '${formatDate(priorDate)}_00-00-00' AND '${formatDate(today)}_23-59-59'`;
    } else {
      whereInput.value = btn.innerText;
    }
  });
});

document.getElementById('applyFilterBtn').addEventListener('click', loadData);

window.onload = loadData;
</script>
</body>
</html>
