<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Svi Podaci - Sustav za Navodnjavanje</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .table-responsive { max-height: 80vh; }
        .sticky-header { position: sticky; top: 0; background-color: #fff; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Svi Zabilježeni Podaci</h2>
            <a href="/" class="btn btn-primary">Povratak na Glavnu Stranicu</a>
        </div>

        <div class="mb-3">
            <input type="text" id="filterInput" class="form-control" placeholder="Filtriraj po bilo kojem stupcu...">
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-striped table-hover">
                <thead class="sticky-header">
                    <tr>
                        <th>ID</th>
                        <th>Vrijeme</th>
                        <th>Temp. Zraka (°C)</th>
                        <th>Vlaga Zraka (%)</th>
                        <th>Temp. Zemlje (°C)</th>
                        <th>Vlaga Zemlje (%)</th>
                        <th>Sirov. Vlaga</th>
                        <th>Napon Vlage (V)</th>
                        <th>Svjetlost (lx)</th>
                    </tr>
                </thead>
                <tbody id="allDataTableBody">
                    <!-- Podaci će biti umetnuti ovdje putem JavaScripta -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const tableBody = document.getElementById('allDataTableBody');
            const filterInput = document.getElementById('filterInput');
            let allLogs = [];

            function formatTimestamp(ts) {
                if (!ts) return '';
                const [date, time] = ts.split('_');
                if (!date || !time) return ts.replace('_', ' ');
                return `${date.split('-').reverse().join('.')} ${time.replace(/-/g, ':')}`;
            }

            async function loadAllData() {
                try {
                    const response = await fetch('/api/logs/all');
                    allLogs = await response.json();
                    renderTable(allLogs);
                } catch (error) {
                    console.error("Greška pri dohvaćanju svih podataka:", error);
                    tableBody.innerHTML = '<tr><td colspan="9" class="text-center text-danger">Nije moguće učitati podatke.</td></tr>';
                }
            }

            function renderTable(logs) {
                tableBody.innerHTML = '';
                if (!logs || logs.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="9" class="text-center">Nema podataka.</td></tr>';
                    return;
                }

                logs.forEach(log => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${log.id}</td>
                        <td>${formatTimestamp(log.timestamp)}</td>
                        <td>${log.dht22_air_temp ?? ''}</td>
                        <td>${log.dht22_humidity ?? ''}</td>
                        <td>${log.ds18b20_soil_temp ?? ''}</td>
                        <td>${log.soil_percent ?? ''}</td>
                        <td>${log.soil_raw ?? ''}</td>
                        <td>${log.soil_voltage ?? ''}</td>
                        <td>${log.lux ?? ''}</td>
                    `;
                    tableBody.appendChild(tr);
                });
            }

            filterInput.addEventListener('keyup', () => {
                const filterText = filterInput.value.toLowerCase();
                const filteredLogs = allLogs.filter(log => {
                    return Object.values(log).some(value =>
                        String(value).toLowerCase().includes(filterText)
                    );
                });
                renderTable(filteredLogs);
            });

            // Inicijalno učitavanje podataka
            loadAllData();
        });
    </script>
</body>
</html>
